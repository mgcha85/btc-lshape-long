remote_theme: just-the-docs/just-the-docs@v0.10.0

url: "https://mgcha85.github.io"
baseurl: "/btc-lshape-long"

color_scheme: dark

aux_links:
  "GitHub Repository":
    - "https://github.com/mgcha85/btc-lshape-long"

aux_links_new_tab: true

