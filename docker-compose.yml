services:
  lshape-trader:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lshape-trader
    restart: unless-stopped
    ports:
      - "8082:8080"
    volumes:
      - ./data:/app/data
    environment:
      - APP_ENV=prod
      - PORT=8080
      - DB_PATH=/app/data/trader.db
      - TZ=Asia/Seoul
    env_file:
      - ./backend/.env.prod
